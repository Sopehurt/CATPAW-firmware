; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 1. Port Window
upload_port = COM15
monitor_port = COM15

; 2. Port macOS
; upload_port = /dev/cu.usbmodem5B5E0490541
; monitor_port = /dev/cu.usbmodem5B5E0490541

upload_speed = 921600
monitor_speed = 115200

; 2. Flash & PSRAM (เทียบเท่า Flash Size: 16MB และ Flash Mode: QIO 80MHz)
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_upload.flash_size = 16MB

; 3. Partition Scheme (ในรูปเป็น 4MB แต่คุณใช้ N16 ควรใช้ 16MB ให้คุ้ม)
board_build.partitions = default_16MB.csv

; 4. USB CDC & PSRAM (เทียบเท่า USB CDC On Boot: Enabled และ PSRAM: OPI)
board_build.arduino.memory_type = qio_opi
build_flags = 
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0 
    -D ARDUINO_USB_MODE=0

; 5. Library ที่ต้องใช้
lib_deps =
    xreef/PCF8575 library @ ^1.1.2
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    h2zero/NimBLE-Arduino